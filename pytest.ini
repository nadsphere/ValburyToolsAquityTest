[pytest]
testpaths = Tests
python_files = Test*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --capture=no

markers =
    positive_test: happy-path test cases
    negative_test: negative / validation test cases
    slow: tests that take longer to run
    registered: tests requiring pre-registered test data

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
